<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>FORJA</title>
    <link rel="icon" href="data:," />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="FORJA" />
    <meta name="theme-color" content="#141210" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div>
          <div class="logo-mark">FORJA</div>
          <div class="logo-sub">Workout Tracker</div>
        </div>
        <nav class="desktop-nav">
          <button class="active" onclick="go('planner',this)">Plano</button>
          <button onclick="go('log',this)">Treinar</button>
          <button onclick="go('history',this)">Histórico</button>
          <button onclick="go('charts',this)">Stats</button>
        </nav>
      </div>

      <div class="content">
        <!-- ══ PLANNER ══ -->
        <div id="page-planner" class="page active">
          <div class="planner-sidebar">
            <div class="sec-label">Dias de treino</div>
            <div class="day-chips" id="day-chips-list"></div>
            <div class="field-row" style="margin-top: 10px">
              <input
                class="field"
                id="new-day-input"
                placeholder="Nome do dia (ex: PUSH)"
              />
              <button
                class="btn-pill btn-primary"
                style="padding: 13px 20px; flex-shrink: 0"
                onclick="addDay()"
              >
                ＋
              </button>
            </div>
          </div>

          <div class="planner-main" id="planner-main" style="display: none">
            <div
              class="divider"
              style="display: none"
              id="planner-divider"
            ></div>
            <div id="planner-ex-section">
              <div class="empty" id="planner-empty-state">
                <div class="empty-icon">👈</div>
                <div class="empty-text">
                  Selecione um dia<br />para editar os exercícios
                </div>
              </div>
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  margin-bottom: 12px;
                "
              >
                <div>
                  <div class="sec-label" style="margin: 0 0 2px">
                    Exercícios
                  </div>
                  <div
                    style="
                      font-family: &quot;Barlow Condensed&quot;, sans-serif;
                      font-weight: 800;
                      font-size: 20px;
                      color: var(--orange);
                    "
                    id="sel-day-title"
                  >
                    —
                  </div>
                </div>
                <button
                  class="btn-pill btn-ghost"
                  style="font-size: 13px; padding: 9px 16px"
                  onclick="toggleDrawer()"
                >
                  ＋ Adicionar
                </button>
              </div>

              <div class="drawer" id="add-ex-drawer">
                <div class="field-row">
                  <input
                    class="field"
                    id="ex-name"
                    placeholder="Nome do exercício"
                  />
                  <select class="field" id="ex-muscle" style="max-width: 150px">
                    <option value="">Músculo</option>
                    <option>Peito</option>
                    <option>Costas</option>
                    <option>Ombro</option>
                    <option>Bíceps</option>
                    <option>Tríceps</option>
                    <option>Quadríceps</option>
                    <option>Posterior</option>
                    <option>Glúteo</option>
                    <option>Panturrilha</option>
                    <option>Abdômen</option>
                  </select>
                </div>
                <div class="field-row">
                  <input
                    class="field"
                    id="ex-sets"
                    type="number"
                    placeholder="Séries"
                    min="1"
                    value="3"
                    inputmode="numeric"
                  />
                  <input
                    class="field"
                    id="ex-reps"
                    type="number"
                    placeholder="Reps"
                    min="1"
                    value="10"
                    inputmode="numeric"
                  />
                </div>
                <div style="display: flex; gap: 8px; margin-top: 4px">
                  <button
                    class="btn-pill btn-ghost btn-full"
                    style="font-size: 13px; padding: 11px"
                    onclick="openLibrary()"
                  >
                    📚 Biblioteca
                  </button>
                  <button
                    class="btn-pill btn-primary btn-full"
                    onclick="addExercise()"
                  >
                    Adicionar
                  </button>
                </div>
              </div>

              <div id="ex-list-body" style="margin-top: 10px">
                <div class="empty">
                  <div class="empty-icon">🏋️</div>
                  <div class="empty-text">Nenhum exercício</div>
                </div>
              </div>

              <button
                class="btn-pill btn-danger-ghost"
                style="margin-top: 4px"
                onclick="deleteCurDay()"
              >
                Deletar este dia
              </button>
            </div>
          </div>
          <!-- /planner-main -->
        </div>
        <!-- /page-planner -->

        <!-- ══ LOG ══ -->
        <div id="page-log" class="page">
          <div class="workout-selector">
            <input
              type="date"
              class="field"
              id="log-date"
              style="flex: 1; min-width: 140px"
            />
            <select
              class="field"
              id="log-day-sel"
              style="flex: 2; min-width: 160px"
              onchange="loadLog()"
            >
              <option value="">— Selecione o treino —</option>
            </select>
          </div>
          <div id="log-body">
            <div class="empty">
              <div class="empty-icon">🔥</div>
              <div class="empty-text">Selecione um dia<br />para começar</div>
            </div>
          </div>
        </div>

        <!-- ══ HISTORY ══ -->
        <div id="page-history" class="page">
          <div class="filter-row">
            <input
              class="field"
              id="hist-search"
              placeholder="Buscar exercício..."
              oninput="renderHistory()"
            />
            <select
              class="field"
              id="hist-day-filter"
              style="max-width: 150px"
              onchange="renderHistory()"
            >
              <option value="">Todos</option>
            </select>
          </div>
          <div id="history-body"></div>
        </div>

        <!-- ══ CHARTS ══ -->
        <div id="page-charts" class="page">
          <div class="stat-grid" id="stat-grid"></div>
          <div class="filter-row">
            <select class="field" id="chart-ex-sel" onchange="renderCharts()">
              <option value="">— Selecione exercício —</option>
            </select>
            <select
              class="field"
              id="chart-metric"
              style="max-width: 150px"
              onchange="renderCharts()"
            >
              <option value="max">Peso máx.</option>
              <option value="volume">Volume</option>
              <option value="avg">Média</option>
            </select>
          </div>
          <div id="charts-body"></div>
        </div>
      </div>
      <!-- /content -->

      <div class="save-bar" id="save-bar">
        <button class="btn-pill btn-ghost btn-full" onclick="clearLog()">
          Limpar
        </button>
        <button class="btn-pill btn-primary btn-full" onclick="saveSession()">
          💾 Salvar
        </button>
      </div>
    </div>
    <!-- /app -->

    <!-- ══ LIBRARY MODAL ══ -->
    <div
      id="lib-overlay"
      style="
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
      "
      onclick="if(event.target===this)closeLibrary()"
    >
      <div
        id="lib-modal"
        style="
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          max-height: 90dvh;
          background: var(--bg2);
          border-radius: 24px 24px 0 0;
          display: flex;
          flex-direction: column;
          overflow: hidden;
        "
      >
        <div
          style="
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
          "
        >
          <div
            style="
              flex: 1;
              font-family: &quot;Barlow Condensed&quot;, sans-serif;
              font-weight: 800;
              font-size: 22px;
              color: var(--orange);
            "
          >
            BIBLIOTECA
          </div>
          <button
            class="btn-icon"
            onclick="closeLibrary()"
            style="background: var(--card2)"
          >
            ✕
          </button>
        </div>
        <div
          style="
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
          "
          id="muscle-filter-chips"
        ></div>
        <div
          style="padding: 12px 16px 8px; border-bottom: 1px solid var(--border)"
        >
          <input
            class="field"
            id="lib-search"
            placeholder="Buscar exercício..."
            oninput="filterLibrary()"
            style="font-size: 15px"
          />
        </div>
        <div
          style="overflow-y: auto; flex: 1; padding: 8px 16px 24px"
          id="lib-list"
        ></div>
      </div>
    </div>

    <!-- ══ BOTTOM NAV ══ -->
    <nav class="bottom-nav">
      <div class="bnav-inner">
        <button
          class="bnav-btn active"
          id="bn-planner"
          onclick="go('planner',this,true)"
        >
          <span class="icon">📋</span><span class="label">Plano</span>
        </button>
        <button class="bnav-btn" id="bn-log" onclick="go('log',this,true)">
          <span class="icon">💪</span><span class="label">Treinar</span>
        </button>
        <button
          class="bnav-btn"
          id="bn-history"
          onclick="go('history',this,true)"
        >
          <span class="icon">📅</span><span class="label">Histórico</span>
        </button>
        <button
          class="bnav-btn"
          id="bn-charts"
          onclick="go('charts',this,true)"
        >
          <span class="icon">📈</span><span class="label">Stats</span>
        </button>
      </div>
    </nav>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
  </body>
</html>
